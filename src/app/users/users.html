<div class="user-list">
  <h2>Felhasználók</h2>
  <div class="list-container">
    @for (user of users(); track user.id) {
      <div class="user-row">
        <span class="user-id">#{{ user.id }}</span>
        <span class="user-name">{{ user.name }}</span>
      </div>
    } @empty {
      <p>Nincsenek elérhető felhasználók.</p>
    }
  </div>
</div>
