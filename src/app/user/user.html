<mat-toolbar color="primary">
    <span class="title" routerLink="device" style="cursor:pointer">Smart OS</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;<span class="username">{{ user()?.name }} profilja</span>
    <span class="spacer"></span>
    <a mat-button routerLink="menu">Menü</a>
    @if(user()?.isAdmin) {
        <a mat-button routerLink="apps">Alkalmazások</a>
    }
    <a mat-button routerLink="users">Felhasználók</a>
    @if(user()?.isAdmin) {
        <button mat-button (click)="addUser()">Felhasználó hozzáadása</button>
    }
    @if(user()?.isAdmin) {
    <button mat-button (click)="simulate()">Szimuláció</button>
}
    <button mat-button (click)="onLogout()">Kijelentkezés</button>
</mat-toolbar>
<div class="user-info">
    <router-outlet />
</div>
