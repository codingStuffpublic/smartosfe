<div class="container">
    <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Név</mat-label>
        <input matInput [(ngModel)]="registeredUsername" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Csoport</mat-label>
        <input matInput [(ngModel)]="registeredGroupname" (keyup.enter)="onCreateGroup()"/>
      </mat-form-field>

      <div class="button-container">
        <button mat-raised-button color="primary" (click)="onCreateGroup()">
          Csoport létrehozása
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Név</mat-label>
        <input matInput [(ngModel)]="enteredUsername" (keyup.enter)="onLogin()"/>
      </mat-form-field>

      <div class="button-container">
        <button mat-raised-button color="primary" (click)="onLogin()">
          Bejelentkezés
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
