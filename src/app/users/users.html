<mat-list>
   @for (user of users(); track $index) {
    <mat-list-item>
        <div class="row">
            <span>{{ user.name }}</span>

            <div class="actions">
                <button mat-icon-button (click)="onAdd(user)">
                    <mat-icon>add</mat-icon>
                </button>

                <button mat-icon-button (click)="onDelete(user)">
                    <mat-icon color="warn">delete</mat-icon>
                </button>
            </div>
        </div>
    </mat-list-item>
    }
</mat-list>
